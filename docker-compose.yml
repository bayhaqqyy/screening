
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sahamscreen-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - sahamscreen-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sahamscreen-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_MESSAGE_MAX_BYTES: 10485760 # 10MB
    networks:
      - sahamscreen-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db-migrator:
    image: postgres:16-alpine
    container_name: sahamscreen-migrator
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-sahamscreen_dev}
    volumes:
      - ./server/migrations:/migrations
    command: >
      sh -c "
        until pg_isready -h postgres -p 5432 -U sahamscreen; do
          echo 'Waiting for database...';
          sleep 2;
        done;
        echo 'Running migrations...';
        for f in $$(ls /migrations/*.sql | sort); do
          echo \"Applying $$f...\";
          psql -h postgres -U sahamscreen -d sahamscreen -v ON_ERROR_STOP=1 -f \"$$f\";
        done;
        echo 'Migrations complete!';
      "
    depends_on:
      - postgres
    networks:
      - sahamscreen-network

  engine-seeder:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: sahamscreen-seeder
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sahamscreen
      - DB_USER=sahamscreen
      - DB_PASS=${POSTGRES_PASSWORD:-sahamscreen_dev}
    command: ["python", "seed_stock_info.py"]
    depends_on:
      db-migrator:
        condition: service_completed_successfully
    networks:
      - sahamscreen-network

  # engine-market: REMOVED in Sprint-7 hygiene pass. The live tick
  # producer (engine/streaming/market_producer.py) has been deleted
  # along with this block — keeping even a commented-out service
  # invites someone to uncomment it and start emitting synthetic OHLCV
  # into production Kafka. Real market data comes from engine-fetcher
  # (yfinance poll) plus the TradingView webhook in
  # server/handlers/webhook.go. See DEPLOYMENT.md if you need a
  # rollback path.

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sahamscreen-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: sahamscreen
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - sahamscreen-network

  postgres:
    image: postgres:16-alpine
    container_name: sahamscreen-postgres
    environment:
      POSTGRES_DB: sahamscreen
      POSTGRES_USER: sahamscreen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sahamscreen_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d

    networks:
      - sahamscreen-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sahamscreen-server
    ports:
      - "8088:8088"
    environment:
      - PORT=8088
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=sahamscreen
      - DB_PASSWORD=${POSTGRES_PASSWORD:-sahamscreen_dev}
      - DB_NAME=sahamscreen
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      - KAFKA_BROKER=kafka:29092
      - TV_WEBHOOK_PATH_TOKEN=${TV_WEBHOOK_PATH_TOKEN:-}
      - TV_WEBHOOK_SECRET=${TV_WEBHOOK_SECRET:-}
      # AI integration — Groq free-tier OpenAI-compatible endpoint. Stays
      # disabled by default. Set AI_ENABLED=true and populate GROQ_API_KEY
      # in your .env to enable outbound calls.
      - AI_ENABLED=${AI_ENABLED:-false}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_API_URL=${GROQ_API_URL:-https://api.groq.com/openai/v1/chat/completions}
      - GROQ_FAST_MODEL=${GROQ_FAST_MODEL:-llama-3.1-8b-instant}
      - GROQ_PRO_MODEL=${GROQ_PRO_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      - GROQ_TIMEOUT_MS=${GROQ_TIMEOUT_MS:-8000}
      - GROQ_CACHE_TTL_SECONDS=${GROQ_CACHE_TTL_SECONDS:-120}
      - AI_RATE_LIMIT_PER_MIN=${AI_RATE_LIMIT_PER_MIN:-20}
      - AI_RATE_LIMIT_BURST=${AI_RATE_LIMIT_BURST:-5}
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    networks:
      - sahamscreen-network

  # engine-indicator: re-enabled so engine-screener has access to RSI / VWAP /
  # MACD / EMA fields when evaluating Swing and Scalping. engine-fetcher also
  # produces idx.ohlcv.enriched without TA fields (that flow keeps
  # stock_info live even if engine-indicator is slow); engine-indicator
  # republishes the same topic with TA fields filled in. The Go consumer's
  # persistMarketTick is idempotent so the dual producer is safe.
  engine-indicator:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: sahamscreen-engine-indicator
    environment:
      - KAFKA_BROKER=kafka:29092
    command: ["python", "streaming/indicator_consumer.py"]
    depends_on:
      - kafka
    networks:
      - sahamscreen-network
    restart: "always"

  engine-bandar:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: sahamscreen-engine-bandar
    environment:
      - KAFKA_BROKER=kafka:29092
    command: ["python", "streaming/bandar_consumer.py"]
    depends_on:
      - kafka
    networks:
      - sahamscreen-network

  # engine-screener: re-enabled so BSJP / Swing / Scalping pages have data
  # even before TradingView Pine alerts are wired up. The TradingView webhook
  # in server/handlers/webhook.go writes to the same screener_results table
  # with source='tradingview', so the two sources coexist without conflict.
  engine-screener:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: sahamscreen-engine-screener
    environment:
      - KAFKA_BROKER=kafka:29092
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sahamscreen
      - DB_USER=sahamscreen
      - DB_PASS=${POSTGRES_PASSWORD:-sahamscreen_dev}
    command: ["python", "streaming/screener_consumer.py"]
    depends_on:
      - kafka
      - postgres
    networks:
      - sahamscreen-network
    restart: "always"


  engine-fetcher:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: sahamscreen-engine-fetcher
    environment:
      - KAFKA_BROKER=kafka:29092
      - FETCH_INTERVAL_MINUTES=1
    command: ["python", "data/fetcher.py"]
    depends_on:
      - kafka
    networks:
      - sahamscreen-network
    restart: "always"

  engine-news-fetcher:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: sahamscreen-engine-news-fetcher
    environment:
      - KAFKA_BROKER=kafka:29092
    command: ["python", "data/news_fetcher.py"]
    depends_on:
      - kafka
    networks:
      - sahamscreen-network
    restart: "always"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sahamscreen-web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8088/api
      - VITE_WS_URL=ws://localhost:8088/ws/stream
    depends_on:
      - server
    networks:
      - sahamscreen-network
    volumes:
      - ./web:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sahamscreen-cloudflared
    restart: unless-stopped
    # Token-based mode: configure the public hostname (e.g. webhook.bayhaqqy.my.id)
    # in the Cloudflare Zero Trust dashboard and point it at http://server:8088.
    # See infra/cloudflared/README.md for setup steps.
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - server
    networks:
      - sahamscreen-network
    profiles:
      - tunnel


networks:
  sahamscreen-network:
    driver: bridge

volumes:
  pgdata:
