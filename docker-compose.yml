
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sahamscreen-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - sahamscreen-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sahamscreen-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_MESSAGE_MAX_BYTES: 10485760 # 10MB
    networks:
      - sahamscreen-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db-migrator:
    image: postgres:16-alpine
    container_name: sahamscreen-migrator
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-sahamscreen_dev}
    volumes:
      - ./server/migrations:/migrations
    command: >
      sh -c "
        until pg_isready -h postgres -p 5432 -U sahamscreen; do
          echo 'Waiting for database...';
          sleep 2;
        done;
        echo 'Running migrations...';
        psql -h postgres -U sahamscreen -d sahamscreen -v ON_ERROR_STOP=1 -f /migrations/001_init.sql;
        psql -h postgres -U sahamscreen -d sahamscreen -v ON_ERROR_STOP=1 -f /migrations/002_production_tables.sql;
        psql -h postgres -U sahamscreen -d sahamscreen -v ON_ERROR_STOP=1 -f /migrations/003_align_news_and_add_volume.sql;
        psql -h postgres -U sahamscreen -d sahamscreen -v ON_ERROR_STOP=1 -f /migrations/004_tv_alerts.sql;
        echo 'Migrations complete!';
      "
    depends_on:
      - postgres
    networks:
      - sahamscreen-network

  engine-seeder:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: sahamscreen-seeder
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sahamscreen
      - DB_USER=sahamscreen
      - DB_PASS=${POSTGRES_PASSWORD:-sahamscreen_dev}
    command: ["python", "seed_stock_info.py"]
    depends_on:
      db-migrator:
        condition: service_completed_successfully
    networks:
      - sahamscreen-network

  # engine-market disabled: live tick simulation is replaced by TradingView webhooks.
  # Kept here for easy rollback during migration. Re-enable by uncommenting.
  # engine-market:
  #   build:
  #     context: ./engine
  #     dockerfile: Dockerfile
  #   container_name: sahamscreen-engine-market
  #   environment:
  #     - KAFKA_BROKER=kafka:29092
  #   command: ["python", "streaming/market_producer.py"]
  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #   networks:
  #     - sahamscreen-network
  #   restart: "always"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sahamscreen-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: sahamscreen
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - sahamscreen-network

  postgres:
    image: postgres:16-alpine
    container_name: sahamscreen-postgres
    environment:
      POSTGRES_DB: sahamscreen
      POSTGRES_USER: sahamscreen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sahamscreen_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d

    networks:
      - sahamscreen-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sahamscreen-server
    ports:
      - "8088:8088"
    environment:
      - PORT=8088
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=sahamscreen
      - DB_PASSWORD=${POSTGRES_PASSWORD:-sahamscreen_dev}
      - DB_NAME=sahamscreen
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      - KAFKA_BROKER=kafka:29092
      - TV_WEBHOOK_PATH_TOKEN=${TV_WEBHOOK_PATH_TOKEN:-}
      - TV_WEBHOOK_SECRET=${TV_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    networks:
      - sahamscreen-network

  # engine-indicator disabled: technical indicators are now computed inside the
  # TradingView Pine Script that fires the webhook. Kept here for rollback.
  # engine-indicator:
  #   build:
  #     context: ./engine
  #     dockerfile: Dockerfile
  #   container_name: sahamscreen-engine-indicator
  #   environment:
  #     - KAFKA_BROKER=kafka:29092
  #   command: ["python", "streaming/indicator_consumer.py"]
  #   depends_on:
  #     - kafka
  #   networks:
  #     - sahamscreen-network

  engine-bandar:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: sahamscreen-engine-bandar
    environment:
      - KAFKA_BROKER=kafka:29092
    command: ["python", "streaming/bandar_consumer.py"]
    depends_on:
      - kafka
    networks:
      - sahamscreen-network

  # engine-screener disabled: BSJP / Swing / Scalping signals now arrive via the
  # TradingView webhook (server/handlers/webhook.go). Kept here for rollback.
  # engine-screener:
  #   build:
  #     context: ./engine
  #     dockerfile: Dockerfile
  #   container_name: sahamscreen-engine-screener
  #   environment:
  #     - KAFKA_BROKER=kafka:29092
  #     - DB_HOST=postgres
  #     - DB_PORT=5432
  #     - DB_NAME=sahamscreen
  #     - DB_USER=sahamscreen
  #     - DB_PASS=${POSTGRES_PASSWORD:-sahamscreen_dev}
  #   command: ["python", "streaming/screener_consumer.py"]
  #   depends_on:
  #     - kafka
  #     - postgres
  #   networks:
  #     - sahamscreen-network


  engine-fetcher:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: sahamscreen-engine-fetcher
    environment:
      - KAFKA_BROKER=kafka:29092
      - FETCH_INTERVAL_MINUTES=1
    command: ["python", "data/fetcher.py"]
    depends_on:
      - kafka
    networks:
      - sahamscreen-network
    restart: "always"

  engine-news-fetcher:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: sahamscreen-engine-news-fetcher
    environment:
      - KAFKA_BROKER=kafka:29092
    command: ["python", "data/news_fetcher.py"]
    depends_on:
      - kafka
    networks:
      - sahamscreen-network
    restart: "always"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sahamscreen-web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8088/api
      - VITE_WS_URL=ws://localhost:8088/ws/stream
    depends_on:
      - server
    networks:
      - sahamscreen-network
    volumes:
      - ./web:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sahamscreen-cloudflared
    restart: unless-stopped
    # Token-based mode: configure the public hostname (e.g. webhook.bayhaqqy.my.id)
    # in the Cloudflare Zero Trust dashboard and point it at http://server:8088.
    # See infra/cloudflared/README.md for setup steps.
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - server
    networks:
      - sahamscreen-network
    profiles:
      - tunnel


networks:
  sahamscreen-network:
    driver: bridge

volumes:
  pgdata:
